apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-poc
  labels:
    app: cicd-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cicd-poc
  template:
    metadata:
      labels:
        app: cicd-poc
    spec:
      containers:
        - name: cicd-poc
          image: docker.io/hurtlinb/cicdpoc:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
