name: Build and promote version

on:
  push:
    branches:
      - dev
      - main
    paths-ignore:
      - k8s/overlays/dev/kustomization.yaml
      - k8s/overlays/prod/kustomization.yaml

jobs:
  prepare:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      app_version: ${{ steps.vars.outputs.app_version }}
      target_file: ${{ steps.vars.outputs.target_file }}
      release_label: ${{ steps.vars.outputs.release_label }}
      target_branch: ${{ steps.vars.outputs.target_branch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve branch-specific variables
        id: vars
        shell: bash
        run: |
          app_version="$(python3 -c 'import json; print(json.load(open("package.json", encoding="utf-8"))["version"])')"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"

          case "${GITHUB_REF_NAME}" in
            dev)
              echo "target_file=k8s/overlays/dev/kustomization.yaml" >> "$GITHUB_OUTPUT"
              echo "release_label=dev" >> "$GITHUB_OUTPUT"
              echo "target_branch=dev" >> "$GITHUB_OUTPUT"
              ;;
            main)
              echo "target_file=k8s/overlays/prod/kustomization.yaml" >> "$GITHUB_OUTPUT"
              echo "release_label=prod" >> "$GITHUB_OUTPUT"
              echo "target_branch=main" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

  build_dev_image:
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    needs: prepare

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/hurtlinb/cicdpoc
          tags: |
            type=raw,value=${{ needs.prepare.outputs.app_version }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update_dev_overlay:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_dev_image
    if: needs.prepare.result == 'success' && github.ref_name == 'dev' && needs.build_dev_image.result == 'success'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_branch }}

      - name: Update cicdpoc image tag
        shell: bash
        run: |
          target_file="${{ needs.prepare.outputs.target_file }}"
          sed -i "s/newTag: .*/newTag: ${{ needs.prepare.outputs.app_version }}/" "$target_file"

      - name: Commit and push overlay change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ needs.prepare.outputs.target_file }}"
          git commit -m "cicdpoc ${{ needs.prepare.outputs.release_label }} -> v${{ needs.prepare.outputs.app_version }}" || exit 0
          git push

  update_prod_overlay:
    runs-on: ubuntu-latest
    needs:
      - prepare
    if: needs.prepare.result == 'success' && github.ref_name == 'main'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update prod image tag
        shell: bash
        run: |
          target_file="${{ needs.prepare.outputs.target_file }}"
          sed -i "s/newTag: .*/newTag: ${{ needs.prepare.outputs.app_version }}/" "$target_file"

      - name: Commit and push prod overlay change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ needs.prepare.outputs.target_file }}"
          git commit -m "cicdpoc ${{ needs.prepare.outputs.release_label }} -> v${{ needs.prepare.outputs.app_version }}" || exit 0
          git push
