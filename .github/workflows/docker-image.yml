name: Build and push Docker image on dev

on:
  push:
    branches:
      - dev

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/hurtlinb/cicdpoc
          tags: |
            type=raw,value=dev
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Checkout gitops repository
        uses: actions/checkout@v4
        with:
          repository: hurtlinb/gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update cicdpoc dev image tag
        run: |
          sed -i "s/newTag: .*/newTag: sha-${GITHUB_SHA::7}/" gitops/apps/cicdpoc/overlays/dev/kustomization.yaml

      - name: Commit and push gitops change
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/cicdpoc/overlays/dev/kustomization.yaml
          git commit -m "cicdpoc dev -> sha-${GITHUB_SHA::7}" || exit 0
          git push
