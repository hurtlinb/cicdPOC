name: Build and push Docker image

on:
  push:
    branches:
      - dev
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Set branch-specific variables
        id: vars
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            dev)
              echo "docker_tags=type=raw,value=dev" >> "$GITHUB_OUTPUT"
              echo "gitops_overlay=dev" >> "$GITHUB_OUTPUT"
              echo "release_label=dev" >> "$GITHUB_OUTPUT"
              ;;
            main)
              echo "docker_tags=type=raw,value=latest" >> "$GITHUB_OUTPUT"
              echo "gitops_overlay=prod" >> "$GITHUB_OUTPUT"
              echo "release_label=prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/hurtlinb/cicdpoc
          tags: |
            ${{ steps.vars.outputs.docker_tags }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Checkout gitops repository
        uses: actions/checkout@v4
        with:
          repository: hurtlinb/gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update cicdpoc image tag
        shell: bash
        run: |
          target_file="gitops/apps/cicdpoc/overlays/${{ steps.vars.outputs.gitops_overlay }}/kustomization.yaml"
          sed -i "s/newTag: .*/newTag: sha-${GITHUB_SHA::7}/" "$target_file"

      - name: Commit and push gitops change
        shell: bash
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "apps/cicdpoc/overlays/${{ steps.vars.outputs.gitops_overlay }}/kustomization.yaml"
          git commit -m "cicdpoc ${{ steps.vars.outputs.release_label }} -> sha-${GITHUB_SHA::7}" || exit 0
          git push
