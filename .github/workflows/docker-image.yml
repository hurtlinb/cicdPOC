name: Build and promote version

on:
  push:
    branches:
      - dev
      - main

jobs:
  prepare:
    runs-on: ubuntu-latest

    outputs:
      app_version: ${{ steps.vars.outputs.app_version }}
      gitops_overlay: ${{ steps.vars.outputs.gitops_overlay }}
      release_label: ${{ steps.vars.outputs.release_label }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve branch-specific variables
        id: vars
        shell: bash
        run: |
          app_version="$(python3 -c 'import json; print(json.load(open("package.json", encoding="utf-8"))["version"])')"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"

          case "${GITHUB_REF_NAME}" in
            dev)
              echo "gitops_overlay=dev" >> "$GITHUB_OUTPUT"
              echo "release_label=dev" >> "$GITHUB_OUTPUT"
              ;;
            main)
              echo "gitops_overlay=prod" >> "$GITHUB_OUTPUT"
              echo "release_label=prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

  build_dev_image:
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    needs: prepare

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/hurtlinb/cicdpoc
          tags: |
            type=raw,value=${{ needs.prepare.outputs.app_version }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update_gitops:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_dev_image
    if: always() && needs.prepare.result == 'success' && (github.ref_name != 'dev' || needs.build_dev_image.result == 'success')

    steps:
      - name: Checkout gitops repository
        uses: actions/checkout@v4
        with:
          repository: hurtlinb/gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update cicdpoc image tag
        shell: bash
        run: |
          target_file="gitops/apps/cicdpoc/overlays/${{ needs.prepare.outputs.gitops_overlay }}/kustomization.yaml"
          sed -i "s/newTag: .*/newTag: ${{ needs.prepare.outputs.app_version }}/" "$target_file"

      - name: Commit and push gitops change
        shell: bash
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "apps/cicdpoc/overlays/${{ needs.prepare.outputs.gitops_overlay }}/kustomization.yaml"
          git commit -m "cicdpoc ${{ needs.prepare.outputs.release_label }} -> v${{ needs.prepare.outputs.app_version }}" || exit 0
          git push
